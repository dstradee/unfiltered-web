        .noise-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1; opacity: 0.06; background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E'); }

        h1, h2, .logo-text { font-family: 'Bebas Neue', sans-serif; color: var(--smoke-white); letter-spacing: 8px; text-transform: uppercase; font-weight: normal; }
        .code-data { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--electric-cyan); font-size: 0.9rem; letter-spacing: 1px; }

        .container { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 0 2rem; width: 100%; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { padding: 4rem 0 3rem 0; display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid rgba(148, 163, 184, 0.1); }
        .brand-logo { display: flex; align-items: baseline; gap: 8px; font-size: 2rem; }
        .unfiltered-word { border-bottom: 2px solid var(--electric-cyan); padding-bottom: 2px; }
        
        /* PUNTITOS DE ALERTAS */
        .header-controls { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center; }
        .alert-indicator {
            display: flex; align-items: center; gap: 0.5rem; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; text-decoration: none;
            display: none; /* Oculto por defecto */
        }
        
        .pink-dot { width: 10px; height: 10px; background-color: var(--hot-pink); border-radius: 50% !important; animation: pulse-pink 1.5s infinite; }
        @keyframes pulse-pink { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 127, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 0, 127, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 127, 0); } }

        .red-dot { width: 10px; height: 10px; background-color: var(--crimson-war); border-radius: 50% !important; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 49, 49, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 49, 49, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 49, 49, 0); } }

        .auth-link { font-family: 'JetBrains Mono', monospace; color: var(--matrix-green); text-decoration: none; font-size: 0.85rem; letter-spacing: 1px; transition: color 0.2s ease; }
        .auth-link:hover { color: var(--smoke-white); }

        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 15vh; } 
        
        .terminal-box { background-color: var(--vantablack); border: 1px solid rgba(148, 163, 184, 0.2); padding: 2rem; width: 100%; position: relative; }
        .terminal-header { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(148, 163, 184, 0.2); padding-bottom: 1rem; margin-bottom: 1.5rem; }
        
        .btn { display: inline-block; padding: 1rem 2rem; font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s ease; text-decoration: none; text-align: center; width: 100%; }

        /* Contenido Secreto */
        #secretContent { width: 100%; max-width: 800px; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

    <script>
        const SUPABASE_URL = 'https://qtpuipgkytzjnckkkwnl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_eA2g7-rTvcPcfz_dVl2aWg_Ca5P7t93';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Controlar los puntitos de la cabecera
        async function fetchSystemState() {
            try {
                const { data, error } = await supabaseClient
                    .from('logs')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                // --- Puntito Rojo (Noticias) ---
                const emergencyLog = data.find(log => log.log_type === 'news_alert');
                if (emergencyLog && emergencyLog.value_text !== "0") {
                    const endTime = parseInt(emergencyLog.value_text);
                    if (endTime > new Date().getTime()) {
                        document.getElementById('newsDot').style.display = 'flex';
                    }
                }

                // --- Puntito Rosa (Descuentos) ---
                const discountLog = data.find(log => log.log_type === 'discount_alert');
                if (discountLog && discountLog.value_text !== "0") {
                    const parts = discountLog.value_text.split('|');
                    const endTime = parseInt(parts[0]);
                    if (endTime > new Date().getTime()) {
                        document.getElementById('discountDot').style.display = 'flex';
                    }
                }

            } catch (err) {
                console.error("Error connecting to Vault:", err);
            }
        }

        fetchSystemState();

        // Escuchar cambios en vivo para apagar/encender puntitos si estás dentro
        supabaseClient.channel('drop_header')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'logs' }, payload => {
                fetchSystemState();
            })
            .subscribe();
            
    </script>
